name: 'Assets'
description: 'In case an asset is mangled and other issues touching asset conversion.'

labels: ["Asset Conversion"]
type: bug

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report your issue.
        Remember to keep the [reporting guidelines](https://github.com/Yellow-Dog-Man/Resonite.UnitySDK?tab=readme-ov-file#what-if-something-doesnt-convert-properly) in mind.
        Remember to update to the [latest version](github.com/yellow-Dog-Man/resonite.UnitySDK/releases/latest) of the Resonite Unity SDK before reporting a bug.

  - type: input
    id: version
    attributes:
      label: 'SDK version'
      description: 'Version of the Resonite SDK in use.'
      placeholder: 'x.x.x'
    validations:
      required: true

  - type: input
    id: version-unity
    attributes:
      label: 'Unity version'
      description: 'Version of Unity in use.'
      placeholder: '2022.3.62f3'
    validations:
      required: true

  - type: input
    id: version-resonite
    attributes:
      label: 'Resonite version'
      description: 'Version of Resonite in use.'
      placeholder: '2026.3.11.1400'
    validations:
      required: true

  - type: dropdown
    id: mods-present
    attributes:
      label: 'I tested the issue **without** mods.'
      description: 'Did you test the issue without any mods to make sure it is not caused by those.'
      options:
        - 'Yes'
        - 'No'
      default: 0
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: 'What were you trying to import?'
      description: 'Give us some details on which type of asset you were trying to convert, and how it is used in the scene (through which components, etc).'
    validations:
      required: true

  - type: textarea
    id: expect
    attributes:
      label: 'What were you expecting?'
      description: 'Describe what you expected to happen. Reference screenshots are recommended.'
    validations:
      required: true

  - type: textarea
    id: instead
    attributes:
      label: 'What happened instead?'
      description: 'Describe how the conversion ended up looking. Screenshots are recommended.'
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 'Reproduction items'
      description: 'Share any links and/or items that can be used to reproduce the issue. If you cannot share a mesh, you can create a basic sphere or cube mesh and apply the material/shader to it. If you cannot upload the unitypackage as-is, compress it as a ZIP file.'
    validations:
      required: false
